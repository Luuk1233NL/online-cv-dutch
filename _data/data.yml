career-profile:
  title: Profiel 
  summary: |
    Zorgprofessional met een passie voor technologie, op zoek naar een nieuwe uitdaging
    in de IT. Ik combineer een analytische instelling met praktische ervaring uit de 
    zorgsector en ben gedreven om mijzelf verder te ontwikkelen in de IT. Momenteel volg
    ik een hbo-opleiding IT met het profiel Business, IT & Management (BIM). Ik ben
    nieuwschierig, oplossingsgericht. Ik ga graag aan de slag met uitdagingen die een om
    een combinatie van analytisch denken en praktisch inzicht vragen. 
