experiences:
  title: Werkervaring
  info:
  - role: Student HBO-IT BIM
    time: februari 2026 - heden
    company: HAN
    details: |
      Sinds februari 2026 volg ik de deeltijd hbo-opleiding IT aan de HAN, met het profiel Business, IT & Management (BIM). 
      Mijn eerste modules heb ik met goede resultaten afgerond, waaronder Business Process Analyse (7,5), 
      Business Management (organisatierapport, 7,9) en de kennistoets Business Management (6,7). 
      Daarnaast werk ik actief aan mijn technische ontwikkeling. Zo heb ik ervaring opgedaan met Linux 
      (basisbeheer via de command line), werk ik met Docker voor het draaien van containers en gebruik ik Git voor versiebeheer. 
      Ook ben ik bezig met het analyseren en oplossen van technische vraagstukken op een gestructureerde manier.
  - role: Persoonlijk begeleider
    time: april 2026 - heden
    company: "'s Heeren Loo, Apeldoorn"
    #details: 
  - role: Verpleegkundige
    time: mei 2025 - april 2026
    company: "'s Heeren Loo, Apeldoorn"
    #details: 
  - role: Persoonlijk begeleider
    time: december 2024 - april 2025
    company: Elver
    #details: 
  - role: Medewerker zorginnovatie
    time: april 2022 - april 2025
    company: Elver
    details: 
      Als medewerker zorginnovatie maakte ik deel uit van een werkgroep die zich inzette
      om de digitale wereld dichter bij clienten te brengen. Ik gaf advies over de inzet
      van verschillende innovaties, legde uit hoe deze werken in de praktijk en verzorgde
      trainingen voor collega's en scholen over het belang van innovatie in de zorg. 
  - role: Begeleider ernstig meervoudig beperkten
